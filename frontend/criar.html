<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Região</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
    <div class="bg-white border-bottom py-2 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <span id="usuario-logado" class="text-muted small bg-secondary-subtle px-2 py-1 rounded">👤 Carregando...</span>
            <button onclick="localStorage.removeItem('token_mapas'); window.location.href='login.html';" class="btn btn-outline-danger btn-sm">Sair</button>
        </div>
    </div>
    <div class="container my-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h2 class="h5 mb-0 py-1">➕ Anexar Nova Região</h2>
            </div>
            <div class="card-body p-4">
                <div id="mensagem-alerta" class="alert d-none" role="alert"></div>

                <form id="form-criar" onsubmit="salvarRegiao(event)">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Nome da Região</label>
                        <input type="text" id="regiao-nome" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Região Pai (Entidade Mãe) <span class="text-muted small">(Opcional)</span></label>
                        <select id="regiao-pai" class="form-select">
                            <option value="">Nenhuma (Esta será uma Região Raiz)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Imagem da Região (.png)</label>
                        <input type="file" id="regiao-imagem" class="form-control" accept="image/*" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea id="regiao-descricao" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="d-flex justify-content-between pt-2">
                        <a href="index.html" class="btn btn-secondary">Voltar para a Lista</a>
                        <button type="submit" class="btn btn-success">Cadastrar Região</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
        <div id="toast-sistema" class="toast align-items-center text-white border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="d-flex">
                <div id="toast-mensagem" class="toast-body fw-bold"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        function exibirToast(mensagem, variante = "success") {
            const toastElement = document.getElementById('toast-sistema');
            const toastMensagem = document.getElementById('toast-mensagem');
            if (!toastElement || !toastMensagem) return;

            toastMensagem.innerText = mensagem;
            toastElement.classList.remove('bg-success', 'bg-danger', 'bg-warning', 'bg-info');

            if (variante === "success") toastElement.classList.add('bg-success');
            if (variante === "danger") toastElement.classList.add('bg-danger');
            if (variante === "warning") toastElement.classList.add('bg-warning');
            if (variante === "info") toastElement.classList.add('bg-info');

            const bsToast = new bootstrap.Toast(toastElement);
            bsToast.show();
        }

        function extrairIdDoToken(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('0' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                return JSON.parse(jsonPayload).sub;
            } catch (e) { 
                return "1"; 
            }
        }

        async function popularSelectRegioesPai() {
            const selectPai = document.getElementById('regiao-pai');
            try {
                const response = await fetch(`${API_URL}/regiao`);
                if (response.ok) {
                    const regioes = await response.json();
                    selectPai.innerHTML = '<option value="">Nenhuma (Esta será uma Região Raiz)</option>';
                    regioes.forEach(reg => {
                        const option = document.createElement('option');
                        option.value = reg.id;       
                        option.innerText = reg.nome; 
                        selectPai.appendChild(option);
                    });
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function salvarRegiao(event) {
            event.preventDefault();
            const token = localStorage.getItem('token_mapas');
            const alerta = document.getElementById('mensagem-alerta');

            if (!token) {
                exibirToast("⚠️ Você precisa estar autenticado.", "warning");
                return;
            }

            const idUsuarioLogado = extrairIdDoToken(token);
            const formData = new FormData();
            formData.append('nome', document.getElementById('regiao-nome').value);
            formData.append('id_criador', idUsuarioLogado);
            formData.append('descricao', document.getElementById('regiao-descricao').value);
            
            const idPai = document.getElementById('regiao-pai').value;
            if (idPai) formData.append('id_regiao_pai', idPai);

            const inputImagem = document.getElementById('regiao-imagem');
            if (inputImagem.files[0]) formData.append('imagem', inputImagem.files[0]);

            try {
                const response = await fetch(`${API_URL}/regiao`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (!response.ok) {
                    const erro = await response.json();
                    throw new Error(erro.detail || "Falha ao salvar.");
                }

                exibirToast("🗺️ Região cadastrada com sucesso!", "success");
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);
            } catch (error) {
                exibirToast(`❌ Erro: ${error.message}`, "danger");
            }
        }

        window.onload = async function() {
            const token = localStorage.getItem('token_mapas');
            if (!token) {
                window.location.href = "login.html";
                return;
            }
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('0' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                document.getElementById('usuario-logado').innerText = `👤 ${JSON.parse(jsonPayload).sub}`;
            } catch (e) {
                document.getElementById('usuario-logado').innerText = `👤 Usuário Autenticado`;
            }
            await popularSelectRegioesPai();
        }
    </script>
</body>
</html>
