<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Conta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm p-4" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <h1 class="h3 font-weight-normal">🌱 Criar Conta</h1>
            <p class="text-muted">Preencha os dados abaixo para se registrar</p>
        </div>

        <div id="mensagem-alerta" class="alert d-none" role="alert"></div>

        <form onsubmit="executarCadastro(event)">
            <div class="mb-3">
                <label for="cadastro-nome" class="form-label">Nome Completo</label>
                <input type="text" id="cadastro-nome" class="form-control" required placeholder="Mínimo 3 caracteres">
            </div>
            <div class="mb-3">
                <label for="cadastro-email" class="form-label">E-mail</label>
                <input type="email" id="cadastro-email" class="form-control" required placeholder="seu@email.com">
            </div>
            <div class="mb-3">
                <label for="cadastro-senha" class="form-label">Senha</label>
                <input type="password" id="cadastro-senha" class="form-control" required placeholder="Mínimo 8 caracteres">
            </div>
            <div class="mb-3">
                <label for="cadastro-confirmar-senha" class="form-label">Confirme sua Senha</label>
                <input type="password" id="cadastro-confirmar-senha" class="form-control" required placeholder="Repita a senha exatamente">
            </div>
            <div class="mb-3">
                <label for="cadastro-descricao" class="form-label">Descrição Breve <span class="text-muted small">(Opcional)</span></label>
                <input type="text" id="cadastro-descricao" class="form-control" placeholder="Ex: Estudante, Pesquisador">
            </div>

            <button class="w-100 btn btn-lg btn-success mb-3" type="submit">Cadastrar Conta</button>
            
            <div class="text-center">
                <p class="small text-muted">Já tem uma conta? <a href="login.html" class="text-decoration-none">Voltar para o Login</a></p>
            </div>
        </form>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        function exibirToast(mensagem, variante = "success") {
            const toastElement = document.getElementById('toast-sistema');
            const toastMensagem = document.getElementById('toast-mensagem');
            
            if (!toastElement || !toastMensagem) return;

            // Atualiza o texto interno
            toastMensagem.innerText = mensagem;

            // Limpa classes de cores antigas do Bootstrap
            toastElement.classList.remove('bg-success', 'bg-danger', 'bg-warning', 'bg-info');

            // Aplica a nova variante de cor baseada no requisito
            if (variante === "success") toastElement.classList.add('bg-success');
            if (variante === "danger") toastElement.classList.add('bg-danger');
            if (variante === "warning") toastElement.classList.add('bg-warning');
            if (variante === "info") toastElement.classList.add('bg-info');

            // Inicializa e exibe o Toast usando a API nativa do Bootstrap 5
            const bsToast = new bootstrap.Toast(toastElement);
            bsToast.show();
        }

        async function executarCadastro(event) {
            event.preventDefault();
            const nome = document.getElementById('cadastro-nome').value;
            const email = document.getElementById('cadastro-email').value;
            const senha = document.getElementById('cadastro-senha').value;
            const confirmarSenha = document.getElementById('cadastro-confirmar-senha').value;
            const descricao = document.getElementById('cadastro-descricao').value;
            const alerta = document.getElementById('mensagem-alerta');

            // REQUISITO 2: Validação no frontend para checar se as senhas coincidem antes de enviar o POST
            if (senha !== confirmarSenha) {
                alerta.className = "alert alert-warning";
                alerta.innerText = "⚠️ As senhas digitadas não coincidem. Verifique e tente novamente.";
                alerta.classList.remove('d-none');
                return;
            }

            try {
                // Envia os dados para a rota do backend
                const responseCadastro = await fetch(`${API_URL}/usuario`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha: senha, descricao }) // Mapeia para o JSON esperado
                });

                if (!responseCadastro.ok) {
                    const erro = await responseCadastro.json();
                    // REQUISITO 4: Exibe mensagem clara do backend (Ex: e-mail em uso)
                    throw new Error(erro.mensagem || erro.detail || "Não foi possível realizar o cadastro.");
                }

                // REQUISITO 3: Cadastro feito com sucesso! Redireciona para o login passando a mensagem na URL
                exibirToast("Cadastro realizado com sucesso!", "success");
                setTimeout(() => {
                    window.location.href = "login.html?sucesso=true";
                }, 1500);

            } catch (error) {
                // REQUISITO 4: Tratamento visual do erro em vermelho na tela
                alerta.className = "alert alert-danger";
                alerta.innerText = `❌ ${error.message}`;
                alerta.classList.remove('d-none');
            }
        }
    </script>
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
        <div id="toast-sistema" class="toast align-items-center text-white border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="d-flex">
                <div id="toast-mensagem" class="toast-body fw-bold">
                    </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
</body>
</html>
